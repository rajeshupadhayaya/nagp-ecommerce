name: Deploy to Production

workflow_dispatch:
  inputs:
    image_tag:
      description: 'Image tag to deploy'
      required: false

workflow_run:
  workflows: ["Build and Push to ECR"]
  types:
    - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubAction-AssumeRoleWithAction
        aws-region: us-east-1

    - name: Download image tag artifact
      if: ${{ github.event_name == 'workflow_run' }}
      uses: actions/download-artifact@v2
      with:
        name: image-tag
        path: ${{ github.workspace }}

    - name: Read image tag from artifact
      if: ${{ github.event_name == 'workflow_run' }}
      id: image
      run: echo "tag=$(cat ${{ github.workspace }}/image-tag.txt)" >> $GITHUB_OUTPUT

    - name: Deploy to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ecommerce-app-task
        service: ecommerce-app-service
        cluster: ecommerce-app-cluster
        image: ${{ github.event.inputs.image_tag || steps.image.outputs.tag }}
        wait-for-service-stability: true
