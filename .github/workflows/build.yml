name: 'Build and Push to ECR'

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: 'Build and Push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubAction-AssumeRoleWithAction
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ecommerce-app-repo
        IMAGE_TAG: ${{ github.sha }}
      run: |
        SHORT_TAG=${IMAGE_TAG:0:8}
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG" >> $GITHUB_OUTPUT
        echo "tag=$SHORT_TAG" >> $GITHUB_OUTPUT
    
    - name: Save image tag to file
      run: echo "${{ steps.build-image.outputs.tag }}" > ${{ github.workspace }}/image-tag.txt
    
    - name: Upload image tag as artifact
      uses: actions/upload-artifact@v4
      with:
        name: image-tag
        path: ${{ github.workspace }}/image-tag.txt
        retention-days: 1
